<!DOCTYPE html>
<html>
<head>

<title>Pretty Parcel Admin</title>

<style>

body{
font-family:Arial;
background:#f6f7fb;
margin:0;
padding:30px;
}

h1{
margin-bottom:20px;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
flex:1;
}

.card h2{
margin:0;
font-size:28px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#fafafa;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.ship{
background:#4caf50;
color:white;
}

.cancel{
background:#e53935;
color:white;
}

</style>

</head>

<body>

<h1>📦 Pretty Parcel Admin</h1>

<div class="dashboard">

<div class="card">
<p>Total Orders</p>
<h2 id="orderCount">0</h2>
</div>

<div class="card">
<p>Total Revenue</p>
<h2 id="revenue">₹0</h2>
</div>

</div>

<table>

<thead>
<tr>
<th>Customer</th>
<th>Email</th>
<th>Total</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

<script>

const API="https://pretty-parcel.onrender.com/api"

async function loadOrders(){

const res = await fetch(API+"/admin/orders")
const orders = await res.json()

document.getElementById("orderCount").innerText = orders.length

let revenue = 0

const rows = orders.map(o=>{

revenue += o.totalPrice

return `
<tr>

<td>${o.userId?.name || "Guest"}</td>
<td>${o.userId?.email || "-"}</td>

<td>₹${o.totalPrice}</td>

<td>${o.orderStatus}</td>

<td>

<button class="ship" onclick="update('${o._id}','shipped')">
Ship
</button>

<button class="cancel" onclick="update('${o._id}','cancelled')">
Cancel
</button>

</td>

</tr>
`

})

document.getElementById("revenue").innerText = "₹"+revenue

document.getElementById("ordersTable").innerHTML = rows.join("")

}

async function update(id,status){

await fetch(API+"/admin/orders/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({status})
})

loadOrders()

}

loadOrders()

setInterval(loadOrders,5000)

</script>

</body>

</html>
