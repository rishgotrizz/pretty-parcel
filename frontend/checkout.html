<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - The Pretty Parcel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .checkout-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-top: 2rem;
        }

        .checkout-form {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        .form-section h3 {
            margin-bottom: 1.5rem;
            color: #d4a5cc;
            font-size: 1.2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #3d3d3d;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            padding: 0.85rem;
            border: 2px solid #f8e8f0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d4a5cc;
            box-shadow: 0 0 0 4px rgba(212, 165, 204, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .order-summary {
            background: linear-gradient(135deg, #f8e8f0, #f5d6e8);
            padding: 1.5rem;
            border-radius: 15px;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #d4a5cc;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .summary-item-name {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .summary-divider {
            border-top: 1px solid rgba(212, 165, 204, 0.3);
            margin: 1rem 0;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.1rem;
            color: #d4a5cc;
        }

        .checkout-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-place-order {
            flex: 1;
            background: linear-gradient(135deg, #d4a5cc, #e6b5d8);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(212, 165, 204, 0.2);
        }

        .btn-place-order:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 165, 204, 0.3);
        }

        .btn-place-order:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-continue-shopping {
            background: white;
            border: 2px solid #d4a5cc;
            color: #d4a5cc;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-continue-shopping:hover {
            background: #f8e8f0;
        }

        .success-message {
            display: none;
            background: #f0fdf4;
            border: 2px solid #4ade80;
            color: #15803d;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .success-message.show {
            display: block;
            animation: slideInUp 0.4s ease-out;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .checkout-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-text">✨ The Pretty Parcel</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <h1 style="font-family: 'Playfair Display'; color: #d4a5cc; margin-bottom: 0.5rem;">Complete Your Order</h1>
        <p style="color: #6b6b6b; margin-bottom: 2rem;">Please provide your delivery details below</p>

        <div class="success-message" id="successMessage">
            <h3>✨ Order Placed Successfully!</h3>
            <p>Your order has been confirmed. You'll receive a confirmation email shortly.</p>
        </div>

        <div class="checkout-grid">
            <!-- Checkout Form -->
            <form class="checkout-form" id="checkoutForm">
                <!-- Personal Information Section -->
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                    </div>
                </div>

                <!-- Delivery Address Section -->
                <div class="form-section">
                    <h3>Delivery Address</h3>
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="address">Street Address</label>
                            <input type="text" id="address" name="address" placeholder="House number, street name" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="postalCode">Postal Code</label>
                            <input type="text" id="postalCode" name="postalCode" required>
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="specialNotes">Special Notes (Optional)</label>
                            <textarea id="specialNotes" name="specialNotes" placeholder="Any special instructions or personalisation details?"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="checkout-actions">
                    <a href="index.html" class="btn-continue-shopping">← Continue Shopping</a>
                    <button type="submit" class="btn-place-order" id="placeOrderBtn">
                        Place Order
                    </button>
                </div>
            </form>

            <!-- Order Summary -->
            <div class="order-summary">
                <div class="summary-title">Order Summary</div>
                <div id="orderItems"></div>
                <div class="summary-divider"></div>
                <div class="summary-total">
                    <span>Total Amount:</span>
                    <span id="orderTotal">₹0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        document.addEventListener('DOMContentLoaded', function() {
            loadCheckoutData();
            document.getElementById('checkoutForm').addEventListener('submit', placeOrder);
        });

        function loadCheckoutData() {
            const cartData = localStorage.getItem('checkoutCart');
            const userData = localStorage.getItem('user');

            if (!cartData) {
                window.location.href = 'index.html';
                return;
            }

            const cart = JSON.parse(cartData);
            const user = JSON.parse(userData);

            // Pre-fill user data
            if (user) {
                document.getElementById('fullName').value = user.name || '';
                document.getElementById('email').value = user.email || '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';
                document.getElementById('city').value = user.city || '';
                document.getElementById('postalCode').value = user.postalCode || '';
            }

            // Display order summary
            const orderItemsContainer = document.getElementById('orderItems');
            orderItemsContainer.innerHTML = cart.map(item => `
                <div class="summary-item">
                    <span class="summary-item-name">
                        <span>${item.emoji}</span>
                        <span>${item.name}</span>
                    </span>
                    <span>×${item.quantity}</span>
                </div>
                <div class="summary-item" style="margin-left: 1.5rem; margin-bottom: 0.5rem;">
                    <span style="color: #d4a5cc; font-weight: 600;">₹${item.price} each</span>
                </div>
            `).join('');

            // Calculate and display total
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('orderTotal').textContent = `₹${total}`;
        }

        async function placeOrder(e) {
            e.preventDefault();

            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                specialNotes: document.getElementById('specialNotes').value
            };

            const cartData = JSON.parse(localStorage.getItem('checkoutCart'));
            const authToken = localStorage.getItem('authToken');

            const placeOrderBtn = document.getElementById('placeOrderBtn');
            placeOrderBtn.disabled = true;
            placeOrderBtn.innerHTML = '<span class="loading"></span> Processing...';

            try {
                const response = await fetch(`${API_BASE_URL}/orders/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        products: cartData,
                        deliveryInfo: formData
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Show success message
                    document.getElementById('successMessage').classList.add('show');
                    document.getElementById('checkoutForm').style.display = 'none';

                    // Clear cart and checkout data
                    localStorage.removeItem('cart');
                    localStorage.removeItem('checkoutCart');

                    // Redirect to home after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    alert(data.message || 'Failed to place order. Please try again.');
                    placeOrderBtn.disabled = false;
                    placeOrderBtn.textContent = 'Place Order';
                }
            } catch (error) {
                console.error('Error placing order:', error);
                alert('Connection error. Please check if backend is running.');
                placeOrderBtn.disabled = false;
                placeOrderBtn.textContent = 'Place Order';
            }
        }
    </script>
</body>
</html>
